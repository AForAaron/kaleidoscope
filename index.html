<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>万花筒</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000; overflow: hidden;
      width: 100vw; height: 100vh;
      touch-action: none;
      user-select: none; -webkit-user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    }
    canvas { display: block; position: absolute; top: 0; left: 0; touch-action: none; }

    #startScreen {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #1a003a 0%, #000 70%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100;
    }
    #startEmoji { font-size: 4rem; margin-bottom: 0.4rem; }
    #startTitle { font-size: 2.4rem; color: #fff; letter-spacing: 0.15em; margin-bottom: 0.5rem; }
    #startSub { color: rgba(255,255,255,0.5); font-size: 1rem; margin-bottom: 3rem; }
    #startBtn {
      width: 150px; height: 150px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: radial-gradient(circle, rgba(130,0,255,0.7), rgba(0,180,255,0.3));
      color: #fff; font-size: 1.2rem; cursor: pointer;
      box-shadow: 0 0 50px rgba(130,0,255,0.5), 0 0 100px rgba(0,180,255,0.2);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #startBtn:active { transform: scale(0.94); }
    #startBtnIcon { font-size: 2.2rem; }

    .ui-btn {
      position: fixed; width: 56px; height: 56px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.75);
      font-size: 1.5rem; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      z-index: 50; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: opacity 0.2s, transform 0.15s, border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent; line-height: 1;
    }
    .ui-btn:active { opacity: 0.5; transform: scale(0.92); }
    #clearBtn   { bottom: 36px; left: 36px; }
    #paletteBtn { bottom: 36px; right: 36px; font-size: 1.3rem; }
    #clearBtn.undo-flash { border-color: rgba(255,200,0,0.8); color: rgba(255,200,0,0.9); }
    #clearBtn.reset-flash { border-color: rgba(100,200,255,0.8); color: rgba(100,200,255,0.9); }

    #panel {
      position: fixed; bottom: 108px; right: 20px; width: 240px;
      background: rgba(10,10,20,0.88);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
      padding: 16px 14px; display: none; flex-direction: column; gap: 14px;
      z-index: 50; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      max-height: calc(100vh - 160px); overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .panel-section-title {
      font-size: 0.7rem; color: rgba(255,255,255,0.4);
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px;
    }

    .palette-item {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; padding: 7px 8px; border-radius: 12px;
      transition: background 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .palette-item.active { background: rgba(255,255,255,0.12); }
    .palette-item:active { background: rgba(255,255,255,0.08); }
    .palette-swatches { display: flex; gap: 4px; }
    .palette-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
    .palette-name { color: rgba(255,255,255,0.85); font-size: 0.82rem; }

    .btn-row { display: flex; gap: 6px; }
    .row-btn {
      flex: 1; padding: 8px 2px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: transparent; color: rgba(255,255,255,0.6);
      font-size: 0.78rem; cursor: pointer; text-align: center; line-height: 1.4;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent; white-space: nowrap;
    }
    .row-btn.active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); color: #fff; }
    .row-btn:active { opacity: 0.6; }
    .row-btn.icon { font-size: 1.2rem; padding: 8px 4px; }

    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .grid-btn {
      padding: 8px 4px; border-radius: 10px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: transparent; color: rgba(255,255,255,0.6);
      font-size: 0.72rem; cursor: pointer; text-align: center; line-height: 1.35;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .grid-btn.active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); color: #fff; }
    .grid-btn:active { opacity: 0.6; }
    .grid-btn.full { grid-column: 1 / -1; }
    .grid-btn.effect-on { border-color: rgba(170,110,255,0.65); color: rgba(210,170,255,1); background: rgba(130,60,255,0.12); }
  </style>
</head>
<body>

<div id="startScreen">
  <div id="startEmoji">🌸</div>
  <div id="startTitle">万花筒</div>
  <div id="startSub">触摸屏幕，创造你的花纹</div>
  <button id="startBtn"><span id="startBtnIcon">✦</span><span>开始</span></button>
</div>

<canvas id="mainCanvas"></canvas>
<button class="ui-btn" id="clearBtn" title="重置 / 长按撤销">↺</button>
<button class="ui-btn" id="paletteBtn" title="设置">🎨</button>

<div id="panel">
  <div>
    <div class="panel-section-title">样式</div>
    <div class="btn-row" id="modeRow"></div>
  </div>
  <div>
    <div class="panel-section-title">大小</div>
    <div class="btn-row" id="sizeRow"></div>
  </div>
  <div id="sectorSection">
    <div class="panel-section-title">折叠数</div>
    <div class="btn-row" id="sectorRow"></div>
  </div>
  <div id="speedSection">
    <div class="panel-section-title">旋转速度</div>
    <div class="btn-row" id="speedRow"></div>
  </div>
  <div id="patternSection">
    <div class="panel-section-title">图案</div>
    <div class="grid-2col" id="patternGrid"></div>
  </div>
  <div>
    <div class="panel-section-title">配色</div>
    <div id="paletteList"></div>
  </div>
  <div id="shapeSection">
    <div class="panel-section-title">形状</div>
    <div class="btn-row" id="shapeRow"></div>
  </div>
  <div id="effectSection">
    <div class="panel-section-title">画笔效果（可叠加）</div>
    <div class="grid-2col" id="effectGrid"></div>
  </div>
</div>

<script>
'use strict';

// ── 常量 ──────────────────────────────────────
const AUTO_ROTATE_BASE = 0.00025;
const TILT_LERP        = 0.05;
const STROKE_WIDTH     = 16;
const TAP_MOVE_PX      = 10;
const TAP_TIME_MS      = 250;
const FLOAT_COUNT      = 24;
const SHAKE_THRESHOLD  = 12;
const ROT_FRICTION     = 0.978;
const RADIUS_RATIOS    = [0.42, 0.56, 0.72];
const UNDO_MAX         = 5;
const SECTOR_OPTIONS   = [4, 6, 8, 12, 16];
// 速度分布拉大，让慢端更明显
const SPEED_OPTIONS    = [
  { label: '极慢', mult: 0.06 },
  { label: '慢',   mult: 0.35 },
  { label: '正常', mult: 1.0  },
  { label: '快',   mult: 2.5  },
  { label: '极快', mult: 6.0  },
];

// ── 默认值（用于重置）──────────────────────────
const DEFAULTS = {
  paletteIdx:    0,
  shapeMode:     'mixed',
  kalMode:       'digital',
  patternIdx:    0,
  sizeIdx:       1,
  sectorCount:   12,
  speedIdx:      2,
};

// ── 配色 ──────────────────────────────────────
const PALETTES = [
  { name: '霓虹荧光',   colors: ['#00ff88','#ff00cc','#ff6600','#00ccff','#ffff00','#ff0066'], bg: '#000000' },
  { name: '糖果马卡龙', colors: ['#ff9eb5','#a8edba','#ffd6a5','#b5c7f7','#ffc8e8','#c3f0ca'], bg: '#0d001a' },
  { name: '彩虹七色',   colors: ['#ff3030','#ff8800','#ffee00','#44ee00','#00aaff','#6644ff','#cc00ff'], bg: '#000000' },
  { name: '星空深蓝',   colors: ['#4488ff','#88ddff','#ffd700','#ffffff','#66aaff','#aaddff'], bg: '#00001a' },
  { name: '宝石彩绘',   colors: ['#c0392b','#2471a3','#1e8449','#d4ac0d','#7d3c98','#e8f8f5'], bg: '#08080e' },
  { name: '花窗玻璃',   colors: ['#1a237e','#880000','#0d5c0d','#cc6600','#4a0072','#cce8ff'], bg: '#03030a' },
];
const SHAPE_MODES = [
  { id: 'circle', label: '●', title: '圆点' },
  { id: 'star',   label: '★', title: '星形' },
  { id: 'mixed',  label: '✦', title: '混搭' },
];
const KAL_MODES = [
  { id: 'digital',     label: '✦ 数字' },
  { id: 'traditional', label: '◆ 传统' },
];
const PATTERNS = [
  { id:'gem',     name:'宝石花', sides:[3],     count:26, sizeMin:10, sizeMax:30, rMinR:0.04, rMaxR:0.80, iMin:0.60, iRng:0.40, sx:1.0,  sy:1.0,  ao:0,          aMin:0.60, aRng:0.35 },
  { id:'crystal', name:'水晶格', sides:[4],     count:20, sizeMin:14, sizeMax:42, rMinR:0.06, rMaxR:0.82, iMin:0.78, iRng:0.22, sx:0.65, sy:1.35, ao:-Math.PI/2, aMin:0.65, aRng:0.30 },
  { id:'snow',    name:'冰雪花', sides:[3],     count:18, sizeMin:10, sizeMax:38, rMinR:0.22, rMaxR:0.92, iMin:0.55, iRng:0.30, sx:0.28, sy:1.0,  ao:-Math.PI/2, aMin:0.50, aRng:0.40 },
  { id:'fan',     name:'彩扇片', sides:[5,6],   count:13, sizeMin:24, sizeMax:56, rMinR:0.06, rMaxR:0.78, iMin:0.75, iRng:0.20, sx:1.0,  sy:1.0,  ao:0,          aMin:0.60, aRng:0.35 },
  { id:'jade',    name:'碎玉石', sides:[5,6,6], count:20, sizeMin:14, sizeMax:36, rMinR:0.06, rMaxR:0.82, iMin:0.80, iRng:0.18, sx:1.0,  sy:0.85, ao:0,          aMin:0.55, aRng:0.30 },
  { id:'shard',   name:'碎玻璃', sides:[3,3,4], count:32, sizeMin:6,  sizeMax:20, rMinR:0.02, rMaxR:0.86, iMin:0.35, iRng:0.65, sx:1.0,  sy:1.0,  ao:0,          aMin:0.65, aRng:0.30 },
  { id:'ice',     name:'浮冰块', sides:[4,5],   count:11, sizeMin:30, sizeMax:62, rMinR:0.08, rMaxR:0.80, iMin:0.60, iRng:0.40, sx:1.3,  sy:0.72, ao:0,          aMin:0.40, aRng:0.45 },
  { id:'spike',   name:'星芒刺', sides:[3],     count:24, sizeMin:10, sizeMax:48, rMinR:0.05, rMaxR:0.88, iMin:0.60, iRng:0.40, sx:0.20, sy:1.0,  ao:-Math.PI/2, aMin:0.65, aRng:0.30 },
];

// ── 状态 ──────────────────────────────────────
let currentPaletteIdx = DEFAULTS.paletteIdx;
let currentShapeMode  = DEFAULTS.shapeMode;
let kaleidoscopeMode  = DEFAULTS.kalMode;
let currentPatternIdx = DEFAULTS.patternIdx;
let radiusSizeIdx     = DEFAULTS.sizeIdx;
let sectorCount       = DEFAULTS.sectorCount;
let sectorAngle       = (Math.PI * 2) / DEFAULTS.sectorCount;
let rotSpeedMultIdx   = DEFAULTS.speedIdx;
let palette           = PALETTES[DEFAULTS.paletteIdx];
let rotVelocity       = 0;
let lastShakeTime     = 0;

let effectFade     = false;
let effectGlow     = false;
let effectVelocity = false;
let effectRainbow  = false;
let effectParticle = false;
let strokeHue      = 0;
let undoHistory    = [];

// ── Canvas ────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');
let trailCanvas, trailCtx;
let W, H, cx, cy, radius, dpr = 1;

function resizeCanvas() {
  dpr    = window.devicePixelRatio || 1;
  W      = window.innerWidth;
  H      = window.innerHeight;
  cx     = W / 2; cy = H / 2;
  radius = Math.min(W, H) * RADIUS_RATIOS[radiusSizeIdx];
  canvas.style.width  = W + 'px'; canvas.style.height = H + 'px';
  canvas.width  = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
  ctx.scale(dpr, dpr);
  trailCanvas = document.createElement('canvas');
  trailCanvas.width  = Math.round(W * dpr);
  trailCanvas.height = Math.round(H * dpr);
  trailCtx = trailCanvas.getContext('2d');
  trailCtx.scale(dpr, dpr);
  trailCtx.lineCap = 'round'; trailCtx.lineJoin = 'round';
  undoHistory = [];
}

// ── 旋转 ──────────────────────────────────────
let autoAngle  = 0;
let tiltAngle  = 0;
let tiltTarget = 0;

// ── 工具 ──────────────────────────────────────
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function hexToRgb(hex) {
  const m = hex.match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  return m ? { r: parseInt(m[1],16), g: parseInt(m[2],16), b: parseInt(m[3],16) } : null;
}

// ── 漂浮粒子（数字模式）──────────────────────
let floaters = [];
function makeFloater() {
  const pool = currentShapeMode==='circle' ? ['circle']
             : currentShapeMode==='star'   ? ['star']
             : ['circle','circle','star'];
  return {
    r:          30 + Math.random() * (radius * 0.82),
    angle:      Math.random() * (sectorAngle * 0.5),
    size:       4 + Math.random() * 10,
    angSpeed:   (0.00015 + Math.random() * 0.0004) * (Math.random() > 0.5 ? 1 : -1),
    colorIdx:   Math.floor(Math.random() * palette.colors.length),
    alpha:      0.45 + Math.random() * 0.45,
    shape:      pool[Math.floor(Math.random() * pool.length)],
    pulsePhase: Math.random() * Math.PI * 2,
    pulseSpd:   0.02 + Math.random() * 0.03,
  };
}
function createFloaters() { floaters = Array.from({ length: FLOAT_COUNT }, makeFloater); }
function updateFloaters(dt) {
  for (const f of floaters) {
    f.angle      += f.angSpeed * dt;
    f.pulsePhase += f.pulseSpd;
    if (f.angle > sectorAngle * 0.5) f.angle -= sectorAngle * 0.5;
    if (f.angle < 0)                 f.angle += sectorAngle * 0.5;
    if (Math.random() > 0.998) f.colorIdx = (f.colorIdx + 1) % palette.colors.length;
  }
}
function drawStar(c, x, y, size) {
  const inner = size * 0.45;
  c.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i * Math.PI) / 5 - Math.PI / 2;
    const r = i % 2 === 0 ? size : inner;
    i === 0 ? c.moveTo(x + r*Math.cos(a), y + r*Math.sin(a))
            : c.lineTo(x + r*Math.cos(a), y + r*Math.sin(a));
  }
  c.closePath(); c.fill();
}

// ── 玻璃片（传统模式）────────────────────────
let glassPieces = [];

function makeGlassPieceFromPattern(pat) {
  const sides    = pat.sides[Math.floor(Math.random() * pat.sides.length)];
  const baseSize = pat.sizeMin + Math.random() * (pat.sizeMax - pat.sizeMin);
  const pts = [];
  for (let i = 0; i < sides; i++) {
    const a   = pat.ao + (i / sides) * Math.PI * 2;
    const irr = pat.iMin + Math.random() * pat.iRng;
    pts.push({ x: baseSize * irr * pat.sx * Math.cos(a),
               y: baseSize * irr * pat.sy * Math.sin(a) });
  }
  return {
    r:            (pat.rMinR + Math.random() * (pat.rMaxR - pat.rMinR)) * radius,
    angle:        Math.random() * (sectorAngle * 0.5),
    pts,
    colorIdx:     Math.floor(Math.random() * palette.colors.length),
    alpha:        pat.aMin + Math.random() * pat.aRng,
    displayAlpha: 0,                       // 渐入起点
    fadeDelay:    Math.random() * 300,     // 错峰出现（ms）
    rotation:     Math.random() * Math.PI * 2,
    angSpeed:     0,
    rotSpeed:     0,
    vr:           0,
    friction:     0.972,                   // 默认摩擦（shuffleGlassPieces 会覆盖）
  };
}

function createGlassPieces() {
  const pat = PATTERNS[currentPatternIdx];
  glassPieces = Array.from({ length: pat.count }, () => makeGlassPieceFromPattern(pat));
}

function shuffleGlassPieces(gentle) {
  const spd = gentle ? 0.0010 : 0.0022;
  const rsp = gentle ? 0.0012 : 0.0045;
  const vrs = gentle ? 0.030  : 0.085;
  for (const g of glassPieces) {
    g.angSpeed = (spd*0.5 + Math.random()*spd) * (Math.random() > 0.5 ? 1 : -1);
    g.rotSpeed = (rsp*0.5 + Math.random()*rsp) * (Math.random() > 0.5 ? 1 : -1);
    g.vr       = (vrs*0.4 + Math.random()*vrs) * (Math.random() > 0.5 ? 1 : -1);
    // 每片摩擦系数略有不同 → 各自先后自然滑停
    g.friction = 0.957 + Math.random() * 0.026;
    if (!gentle && Math.random() > 0.45)
      g.colorIdx = Math.floor(Math.random() * palette.colors.length);
  }
}

function updateGlassPieces(dt) {
  const rMin = 0.03 * radius;
  const rMax = 0.95 * radius;
  for (const g of glassPieces) {

    // ── 渐入 ──
    if (g.displayAlpha < g.alpha) {
      if (g.fadeDelay > 0) {
        g.fadeDelay -= dt;
      } else {
        g.displayAlpha = Math.min(g.alpha, g.displayAlpha + g.alpha * dt / 420);
      }
    }

    // ── 运动（只有速度不为零时才更新）──
    const moving = Math.abs(g.angSpeed) > 1e-6 || Math.abs(g.rotSpeed) > 1e-6 || Math.abs(g.vr) > 1e-6;
    if (!moving) continue;

    g.angle    += g.angSpeed * dt;
    g.rotation += g.rotSpeed * dt;
    g.r        += g.vr * dt;

    // 径向边界弹性反弹，模拟筒壁/中心碰撞
    if (g.r < rMin) { g.r = rMin; g.vr =  Math.abs(g.vr) * 0.32; }
    if (g.r > rMax) { g.r = rMax; g.vr = -Math.abs(g.vr) * 0.32; }

    // 各片用自己的摩擦系数，自然衰减到零
    const decay = Math.pow(g.friction, dt / 16);
    g.angSpeed *= decay; g.rotSpeed *= decay; g.vr *= decay;

    // 低于阈值时精确归零，避免无限漂移
    if (Math.abs(g.angSpeed) < 1e-6) g.angSpeed = 0;
    if (Math.abs(g.rotSpeed) < 1e-6) g.rotSpeed = 0;
    if (Math.abs(g.vr)       < 1e-6) g.vr       = 0;

    while (g.angle > sectorAngle * 0.5) g.angle -= sectorAngle * 0.5;
    while (g.angle < 0)                 g.angle += sectorAngle * 0.5;
  }
}

function renderGlassPiece(c, gx, gy, rot, pts, color, alpha) {
  if (alpha <= 0) return;
  const size = pts.reduce((mx, p) => Math.max(mx, Math.sqrt(p.x*p.x + p.y*p.y)), 0);
  c.save();
  c.translate(gx, gy); c.rotate(rot); c.globalAlpha = alpha;
  c.beginPath(); c.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
  c.closePath();
  const rgb = hexToRgb(color);
  if (rgb) {
    const gr = c.createLinearGradient(-size*.7,-size*.7, size*.7,size*.7);
    gr.addColorStop(0,    `rgba(${clamp(rgb.r+130,0,255)},${clamp(rgb.g+130,0,255)},${clamp(rgb.b+130,0,255)},0.92)`);
    gr.addColorStop(0.45, `rgba(${rgb.r},${rgb.g},${rgb.b},0.78)`);
    gr.addColorStop(1,    `rgba(${clamp(rgb.r-55,0,255)},${clamp(rgb.g-55,0,255)},${clamp(rgb.b-55,0,255)},0.88)`);
    c.fillStyle = gr;
  } else { c.fillStyle = color; }
  c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.62)'; c.lineWidth = 1.6; c.stroke();
  c.save();
  c.translate(pts[0].x*0.3, pts[0].y*0.3); c.rotate(-Math.PI*0.3);
  c.beginPath(); c.ellipse(0,0, size*0.22, size*0.09, 0,0,Math.PI*2);
  c.fillStyle = 'rgba(255,255,255,0.34)'; c.globalAlpha = alpha*0.7; c.fill();
  c.restore(); c.restore();
}

// ── 笔触（数字模式）──────────────────────────
function pickColor() { return palette.colors[Math.floor(Math.random() * palette.colors.length)]; }

function mapToWedge(sx, sy) {
  const total = autoAngle + tiltAngle;
  const dx = sx - cx, dy = sy - cy;
  const r  = Math.sqrt(dx*dx + dy*dy);
  let   th = Math.atan2(dy, dx) - total;
  th = ((th % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  th = th % sectorAngle;
  if (th > sectorAngle / 2) th = sectorAngle - th;
  return { x: cx + r*Math.cos(th), y: cy + r*Math.sin(th) };
}

function drawToWedge(s, nx, ny) {
  const p1 = mapToWedge(s.px, s.py);
  const p2 = mapToWedge(nx, ny);
  const now    = Date.now();
  const moveDt = Math.max(now - (s.drawT || now), 8);
  const dist   = Math.sqrt((nx-s.px)**2 + (ny-s.py)**2);
  s.drawT      = now;
  const speed  = dist / moveDt;

  if (effectParticle) {
    const dx = nx - s.px, dy = ny - s.py;
    const steps = Math.max(1, Math.floor(dist / 6));
    trailCtx.save();
    for (let i = 0; i <= steps; i++) {
      const t   = i / steps;
      const px  = s.px + dx*t + (Math.random()-0.5)*14;
      const py  = s.py + dy*t + (Math.random()-0.5)*14;
      const m   = mapToWedge(px, py);
      const sz  = 1.5 + Math.random() * 5;
      const pc  = effectRainbow ? `hsl(${strokeHue},100%,65%)` : s.color;
      if (effectRainbow) strokeHue = (strokeHue + 1) % 360;
      if (effectGlow) { trailCtx.shadowBlur = 8; trailCtx.shadowColor = pc; }
      trailCtx.globalAlpha = 0.4 + Math.random() * 0.5;
      trailCtx.fillStyle   = pc;
      trailCtx.beginPath(); trailCtx.arc(m.x, m.y, sz, 0, Math.PI*2); trailCtx.fill();
      trailCtx.shadowBlur  = 0;
    }
    trailCtx.restore();
  } else {
    const sc = effectRainbow ? `hsl(${strokeHue},100%,62%)` : s.color;
    const lw = effectVelocity ? clamp(28 - speed * 5, 3, 28) : STROKE_WIDTH;
    trailCtx.save();
    if (effectGlow) { trailCtx.shadowBlur = 18; trailCtx.shadowColor = sc; }
    trailCtx.strokeStyle = sc; trailCtx.lineWidth = lw; trailCtx.globalAlpha = 0.92;
    trailCtx.beginPath(); trailCtx.moveTo(p1.x, p1.y); trailCtx.lineTo(p2.x, p2.y); trailCtx.stroke();
    trailCtx.restore();
    if (effectRainbow) strokeHue = (strokeHue + 3) % 360;
  }
}

// ── 撤销 ──────────────────────────────────────
function saveUndoState() {
  if (undoHistory.length >= UNDO_MAX) undoHistory.shift();
  const snapW = Math.ceil(W * 0.5), snapH = Math.ceil(H * 0.5);
  const snap  = document.createElement('canvas');
  snap.width = snapW; snap.height = snapH;
  snap.getContext('2d').drawImage(trailCanvas, 0, 0, snapW, snapH);
  undoHistory.push(snap);
}
function undoStroke() {
  if (!undoHistory.length) return;
  trailCtx.clearRect(0, 0, W, H);
  trailCtx.drawImage(undoHistory.pop(), 0, 0, W, H);
}

// ── 重置全部设置 ──────────────────────────────
function resetAll() {
  currentPaletteIdx = DEFAULTS.paletteIdx;
  palette           = PALETTES[DEFAULTS.paletteIdx];
  currentShapeMode  = DEFAULTS.shapeMode;
  kaleidoscopeMode  = DEFAULTS.kalMode;
  currentPatternIdx = DEFAULTS.patternIdx;
  radiusSizeIdx     = DEFAULTS.sizeIdx;
  sectorCount       = DEFAULTS.sectorCount;
  sectorAngle       = (Math.PI * 2) / DEFAULTS.sectorCount;
  rotSpeedMultIdx   = DEFAULTS.speedIdx;
  effectFade = effectGlow = effectVelocity = effectRainbow = effectParticle = false;
  strokeHue   = 0;
  rotVelocity = 0;
  undoHistory = [];
  radius = Math.min(W, H) * RADIUS_RATIOS[DEFAULTS.sizeIdx];
  trailCtx.clearRect(0, 0, W, H);
  glassPieces = [];
  createFloaters();
  if (panelOpen) refreshPanel();
}

// ── 触摸 & 鼠标 ───────────────────────────────
const activeStrokes = {};

function getAngleFromCenter(x, y) { return Math.atan2(y - cy, x - cx); }

function applyDragRotation(stroke, nx, ny) {
  const dx1 = stroke.px - cx, dy1 = stroke.py - cy;
  const dx2 = nx - cx,        dy2 = ny - cy;
  if (Math.sqrt(dx1*dx1+dy1*dy1) < 25 || Math.sqrt(dx2*dx2+dy2*dy2) < 25) return;
  let da = getAngleFromCenter(nx, ny) - getAngleFromCenter(stroke.px, stroke.py);
  while (da >  Math.PI) da -= 2*Math.PI;
  while (da < -Math.PI) da += 2*Math.PI;
  const now    = Date.now();
  const moveDt = Math.max(now - (stroke.lastT || now), 8);
  stroke.lastT = now;
  autoAngle += da;
  rotVelocity = Math.max(-0.02, Math.min(0.02, da / moveDt));
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    activeStrokes[t.identifier] = {
      px: t.clientX, py: t.clientY, sx: t.clientX, sy: t.clientY,
      t0: Date.now(), moved: false, color: pickColor(),
    };
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const s = activeStrokes[t.identifier]; if (!s) continue;
    const ddx = t.clientX - s.sx, ddy = t.clientY - s.sy;
    if (!s.moved && Math.sqrt(ddx*ddx+ddy*ddy) > TAP_MOVE_PX) s.moved = true;
    if (s.moved) {
      if (kaleidoscopeMode === 'digital') drawToWedge(s, t.clientX, t.clientY);
      else applyDragRotation(s, t.clientX, t.clientY);
    }
    s.px = t.clientX; s.py = t.clientY;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const s = activeStrokes[t.identifier];
    if (s) {
      if (s.moved && kaleidoscopeMode === 'digital') saveUndoState();
      if (!s.moved && (Date.now() - s.t0) < TAP_TIME_MS) {
        if (kaleidoscopeMode === 'digital') cyclePalette();
        else shuffleGlassPieces(false);
      }
    }
    delete activeStrokes[t.identifier];
  }
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) delete activeStrokes[t.identifier];
});

let mouse = null;
canvas.addEventListener('mousedown', e => {
  mouse = { px: e.clientX, py: e.clientY, sx: e.clientX, sy: e.clientY,
            t0: Date.now(), moved: false, color: pickColor() };
});
canvas.addEventListener('mousemove', e => {
  if (!mouse) return;
  const ddx = e.clientX - mouse.sx, ddy = e.clientY - mouse.sy;
  if (!mouse.moved && Math.sqrt(ddx*ddx+ddy*ddy) > TAP_MOVE_PX) mouse.moved = true;
  if (mouse.moved) {
    if (kaleidoscopeMode === 'digital') drawToWedge(mouse, e.clientX, e.clientY);
    else applyDragRotation(mouse, e.clientX, e.clientY);
  }
  mouse.px = e.clientX; mouse.py = e.clientY;
});
canvas.addEventListener('mouseup', () => {
  if (mouse) {
    if (mouse.moved && kaleidoscopeMode === 'digital') saveUndoState();
    if (!mouse.moved && (Date.now() - mouse.t0) < TAP_TIME_MS) {
      if (kaleidoscopeMode === 'digital') cyclePalette();
      else shuffleGlassPieces(false);
    }
  }
  mouse = null;
});
canvas.addEventListener('mouseleave', () => { mouse = null; });

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && kaleidoscopeMode === 'digital') {
    e.preventDefault(); undoStroke();
  }
});

// ── 陀螺仪 & 晃动 ─────────────────────────────
function onOrientation(e) {
  const gamma = e.gamma || 0, beta = e.beta || 0;
  tiltTarget = (gamma / 90) * Math.PI * 0.75 + (beta / 180) * Math.PI * 0.15;
}
function onMotion(e) {
  if (kaleidoscopeMode !== 'traditional') return;
  const acc = e.acceleration;
  if (!acc || acc.x == null) return;
  const mag = Math.sqrt((acc.x||0)**2 + (acc.y||0)**2 + (acc.z||0)**2);
  const now = Date.now();
  if (mag > SHAKE_THRESHOLD && now - lastShakeTime > 1000) {
    lastShakeTime = now; shuffleGlassPieces(false);
  }
}

// ── 渲染 ──────────────────────────────────────
function renderKaleidoscope() {
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.translate(cx, cy);
  for (let k = 0; k < sectorCount; k++) {
    ctx.save();
    ctx.rotate((autoAngle + tiltAngle) + k * sectorAngle);
    if (k % 2 === 1) ctx.scale(1, -1);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0, radius*1.6, 0, sectorAngle); ctx.closePath(); ctx.clip();
    if (kaleidoscopeMode === 'digital') {
      ctx.drawImage(trailCanvas, -cx, -cy, W, H);
      for (const f of floaters) {
        const fx = f.r * Math.cos(f.angle), fy = f.r * Math.sin(f.angle);
        const sz = f.size * (1 + 0.3 * Math.sin(f.pulsePhase));
        ctx.globalAlpha = f.alpha;
        ctx.fillStyle   = palette.colors[f.colorIdx % palette.colors.length];
        if (f.shape === 'circle') { ctx.beginPath(); ctx.arc(fx, fy, sz, 0, Math.PI*2); ctx.fill(); }
        else drawStar(ctx, fx, fy, sz);
      }
    } else {
      for (const g of glassPieces) {
        renderGlassPiece(ctx,
          g.r * Math.cos(g.angle), g.r * Math.sin(g.angle),
          g.rotation, g.pts,
          palette.colors[g.colorIdx % palette.colors.length],
          g.displayAlpha);   // 使用渐入 alpha
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  ctx.restore();
  if (kaleidoscopeMode === 'traditional') {
    const vg = ctx.createRadialGradient(cx, cy, radius*.76, cx, cy, radius*1.18);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(0.55, 'rgba(0,0,0,0.52)');
    vg.addColorStop(1, 'rgba(0,0,0,0.97)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  }
}

// ── 主循环 ────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  const dt = ts - lastTs || 16;
  lastTs = ts;

  if (kaleidoscopeMode === 'digital') {
    autoAngle += AUTO_ROTATE_BASE * SPEED_OPTIONS[rotSpeedMultIdx].mult * dt;
    if (effectFade) {
      trailCtx.globalCompositeOperation = 'destination-out';
      trailCtx.globalAlpha = 0.006 * (dt / 16);
      trailCtx.fillRect(0, 0, W, H);
      trailCtx.globalCompositeOperation = 'source-over';
      trailCtx.globalAlpha = 1;
    }
  } else {
    autoAngle  += rotVelocity * dt;
    rotVelocity *= Math.pow(ROT_FRICTION, dt / 16);
    if (Math.abs(rotVelocity) < 1e-6) rotVelocity = 0;
  }
  tiltAngle += (tiltTarget - tiltAngle) * TILT_LERP;

  if (kaleidoscopeMode === 'digital') updateFloaters(dt);
  else updateGlassPieces(dt);

  renderKaleidoscope();
  requestAnimationFrame(loop);
}

// ── 状态切换 ──────────────────────────────────
function cyclePalette() {
  currentPaletteIdx = (currentPaletteIdx + 1) % PALETTES.length;
  palette = PALETTES[currentPaletteIdx]; refreshPanel();
}
function setPalette(idx) {
  currentPaletteIdx = idx; palette = PALETTES[idx]; refreshPanel(); closePanel();
}
function setShapeMode(mode) {
  currentShapeMode = mode;
  const pool = mode==='circle'?['circle']:mode==='star'?['star']:['circle','circle','star'];
  floaters.forEach(f => { f.shape = pool[Math.floor(Math.random()*pool.length)]; });
  refreshPanel();
}
function setKaleidoscopeMode(mode) {
  kaleidoscopeMode = mode; rotVelocity = 0;
  if (mode === 'traditional') {
    createGlassPieces();
    shuffleGlassPieces(true);  // 轻柔动画归位，displayAlpha 从 0 渐入
    undoHistory = [];
  }
  refreshPanel(); closePanel();
}
function setPattern(idx) {
  currentPatternIdx = idx; createGlassPieces(); shuffleGlassPieces(true);
  refreshPanel(); closePanel();
}
function setSize(idx) {
  radiusSizeIdx = idx;
  radius = Math.min(W, H) * RADIUS_RATIOS[idx];
  createFloaters();
  if (kaleidoscopeMode === 'traditional') createGlassPieces();
  refreshPanel(); closePanel();
}
function setSectorCount(n) {
  sectorCount = n; sectorAngle = (Math.PI * 2) / n;
  createFloaters(); trailCtx.clearRect(0, 0, W, H); undoHistory = [];
  refreshPanel(); closePanel();
}
function setRotSpeed(idx) {
  rotSpeedMultIdx = idx; refreshPanel();
}

// ── 面板 UI ───────────────────────────────────
const panel          = document.getElementById('panel');
const paletteList    = document.getElementById('paletteList');
const shapeRow       = document.getElementById('shapeRow');
const modeRow        = document.getElementById('modeRow');
const sizeRow        = document.getElementById('sizeRow');
const sectorRow      = document.getElementById('sectorRow');
const speedRow       = document.getElementById('speedRow');
const patternGrid    = document.getElementById('patternGrid');
const effectGrid     = document.getElementById('effectGrid');
const shapeSection   = document.getElementById('shapeSection');
const patternSection = document.getElementById('patternSection');
const effectSection  = document.getElementById('effectSection');
const sectorSection  = document.getElementById('sectorSection');
const speedSection   = document.getElementById('speedSection');
let   panelOpen      = false;

// 面板内点击不冒泡，防止 refreshPanel 重建 DOM 后误关闭
panel.addEventListener('click', e => e.stopPropagation());

function makeBtns(container, labels, activeCheck, onClick) {
  container.innerHTML = '';
  labels.forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'row-btn' + (activeCheck(i) ? ' active' : '');
    btn.textContent = label;
    btn.addEventListener('click', () => onClick(i));
    container.appendChild(btn);
  });
}

function refreshPanel() {
  const isTrad = kaleidoscopeMode === 'traditional';

  makeBtns(modeRow, KAL_MODES.map(m => m.label),
    i => KAL_MODES[i].id === kaleidoscopeMode,
    i => setKaleidoscopeMode(KAL_MODES[i].id));

  makeBtns(sizeRow, ['小','中','大'], i => i === radiusSizeIdx, setSize);

  sectorSection.style.display = isTrad ? 'none' : '';
  makeBtns(sectorRow, SECTOR_OPTIONS.map(n => n+'折'),
    i => SECTOR_OPTIONS[i] === sectorCount,
    i => setSectorCount(SECTOR_OPTIONS[i]));

  speedSection.style.display = isTrad ? 'none' : '';
  makeBtns(speedRow, SPEED_OPTIONS.map(s => s.label),
    i => i === rotSpeedMultIdx, setRotSpeed);

  patternSection.style.display = isTrad ? '' : 'none';
  patternGrid.innerHTML = '';
  PATTERNS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'grid-btn' + (i === currentPatternIdx ? ' active' : '');
    btn.textContent = p.name;
    btn.addEventListener('click', () => setPattern(i));
    patternGrid.appendChild(btn);
  });

  paletteList.innerHTML = '';
  PALETTES.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'palette-item' + (i === currentPaletteIdx ? ' active' : '');
    const sw = document.createElement('div'); sw.className = 'palette-swatches';
    p.colors.slice(0, 5).forEach(c => {
      const d = document.createElement('div'); d.className = 'palette-dot'; d.style.background = c;
      sw.appendChild(d);
    });
    const nm = document.createElement('span'); nm.className = 'palette-name'; nm.textContent = p.name;
    item.appendChild(sw); item.appendChild(nm);
    item.addEventListener('click', () => setPalette(i));
    paletteList.appendChild(item);
  });

  shapeSection.style.display = isTrad ? 'none' : '';
  shapeRow.innerHTML = '';
  SHAPE_MODES.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'row-btn icon' + (m.id === currentShapeMode ? ' active' : '');
    btn.textContent = m.label; btn.title = m.title;
    btn.addEventListener('click', () => setShapeMode(m.id));
    shapeRow.appendChild(btn);
  });

  effectSection.style.display = isTrad ? 'none' : '';
  effectGrid.innerHTML = '';
  const EFFECTS = [
    { label:'渐隐', get:()=>effectFade,     set:v=>{ effectFade     = v; } },
    { label:'发光', get:()=>effectGlow,     set:v=>{ effectGlow     = v; } },
    { label:'速感', get:()=>effectVelocity, set:v=>{ effectVelocity = v; } },
    { label:'彩虹', get:()=>effectRainbow,  set:v=>{ effectRainbow  = v; if(v) strokeHue=0; } },
    { label:'粒子拖尾', full:true, get:()=>effectParticle, set:v=>{ effectParticle = v; } },
  ];
  EFFECTS.forEach(ef => {
    const on  = ef.get();
    const btn = document.createElement('button');
    btn.className = 'grid-btn' + (on ? ' active effect-on' : '') + (ef.full ? ' full' : '');
    btn.textContent = ef.label;
    btn.addEventListener('click', () => { ef.set(!ef.get()); refreshPanel(); });
    effectGrid.appendChild(btn);
  });
}

function openPanel()   { panelOpen = true;  panel.style.display = 'flex'; refreshPanel(); }
function closePanel()  { panelOpen = false; panel.style.display = 'none'; }
function togglePanel() { panelOpen ? closePanel() : openPanel(); }

document.getElementById('paletteBtn').addEventListener('click', e => { e.stopPropagation(); togglePanel(); });
document.addEventListener('click', () => { if (panelOpen) closePanel(); });

// ── ↺ 按钮：短按重置全部，长按撤销（数字模式）──
const clearBtn = document.getElementById('clearBtn');
let clearLongTimer = null, clearDidLong = false;

clearBtn.addEventListener('pointerdown', e => {
  e.preventDefault(); clearDidLong = false;
  clearLongTimer = setTimeout(() => {
    clearDidLong = true;
    if (kaleidoscopeMode === 'digital') {
      undoStroke();
      clearBtn.classList.add('undo-flash');
      setTimeout(() => clearBtn.classList.remove('undo-flash'), 300);
      if (navigator.vibrate) navigator.vibrate(30);
    }
  }, 550);
});
clearBtn.addEventListener('pointerup', () => {
  clearTimeout(clearLongTimer); clearLongTimer = null;
  if (!clearDidLong) {
    resetAll();
    clearBtn.classList.add('reset-flash');
    setTimeout(() => clearBtn.classList.remove('reset-flash'), 350);
  }
  clearDidLong = false;
});
clearBtn.addEventListener('pointerleave', () => {
  clearTimeout(clearLongTimer); clearLongTimer = null; clearDidLong = false;
});

// ── 开始 ──────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', async () => {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res === 'granted') {
        window.addEventListener('deviceorientation', onOrientation);
        window.addEventListener('devicemotion', onMotion);
      }
    } catch (_) {}
  } else {
    if (typeof DeviceOrientationEvent !== 'undefined') window.addEventListener('deviceorientation', onOrientation);
    if (typeof DeviceMotionEvent      !== 'undefined') window.addEventListener('devicemotion', onMotion);
  }
  document.getElementById('startScreen').style.display = 'none';
  clearBtn.style.display = 'flex';
  document.getElementById('paletteBtn').style.display = 'flex';
  resizeCanvas(); createFloaters(); requestAnimationFrame(loop);
});

window.addEventListener('resize', () => {
  resizeCanvas(); createFloaters();
  if (kaleidoscopeMode === 'traditional') createGlassPieces();
});
</script>
</body>
</html>
